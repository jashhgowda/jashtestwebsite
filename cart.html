<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — Jashwanth's Test Site</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a0a;--card:#161616;--border:#222;--accent:#c8f542;--accent-dim:#9ec42e;--text:#f0ede6;--muted:#555;--error:#ff5c5c;--radius:14px;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
    .nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--accent);text-decoration:none;}
    .nav-links{display:flex;gap:28px;}.nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color 0.2s;}.nav-links a:hover,.nav-links a.active{color:var(--text);}
    .page-content{max-width:900px;margin:0 auto;padding:48px 40px;animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .page-tag{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:12px;}
    .page-title{font-family:'DM Serif Display',serif;font-size:2.5rem;margin-bottom:36px;}
    .cart-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
    .cart-items{display:flex;flex-direction:column;gap:12px;}
    .cart-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:18px;transition:border-color 0.2s;}
    .cart-item:hover{border-color:#2e2e2e;}
    .item-emoji{font-size:2.2rem;flex-shrink:0;}
    .item-info{flex:1;}
    .item-name{font-size:15px;font-weight:500;margin-bottom:4px;}
    .item-category{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
    .item-controls{display:flex;align-items:center;gap:10px;}
    .qty-btn{width:28px;height:28px;border-radius:6px;background:#1c1c1c;border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s;}
    .qty-btn:hover{border-color:var(--accent);}
    .qty-val{font-size:14px;min-width:24px;text-align:center;}
    .item-price{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--accent);min-width:70px;text-align:right;}
    .remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;transition:color 0.2s;}
    .remove-btn:hover{color:var(--error);}
    .empty-cart{text-align:center;padding:80px 20px;color:var(--muted);}
    .empty-cart .big-emoji{font-size:3rem;margin-bottom:16px;}
    .empty-cart p{margin-bottom:24px;}
    .btn-shop{display:inline-block;background:var(--accent);color:#0d0d0d;border-radius:8px;padding:12px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-decoration:none;transition:background 0.2s;}
    .btn-shop:hover{background:var(--accent-dim);}
    .summary{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;position:sticky;top:90px;}
    .summary-title{font-family:'DM Serif Display',serif;font-size:1.3rem;margin-bottom:24px;}
    .summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:12px;}
    .summary-row.total{font-size:16px;color:var(--text);font-weight:500;border-top:1px solid var(--border);padding-top:16px;margin-top:8px;}
    .checkout-btn{width:100%;background:var(--accent);color:#0d0d0d;border:none;border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:20px;transition:background 0.2s;}
    .checkout-btn:hover{background:var(--accent-dim);}
    .continue-link{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:none;}
    .continue-link:hover{color:var(--accent);}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid var(--border);border-radius:10px;padding:13px 24px;font-size:13px;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{border-color:var(--accent);color:var(--accent);}
    .page-credit{position:fixed;bottom:14px;right:18px;font-size:11px;color:#2a2a2a;z-index:10;}.page-credit span{color:var(--accent);}
    @media(max-width:700px){.cart-layout{grid-template-columns:1fr;}.page-content{padding:32px 20px;}nav{padding:14px 20px;}.nav-links{display:none;}}
  </style>
</head>
<body>
<nav>
  <a href="dashboard.html" class="nav-logo">Jashwanth</a>
  <div class="nav-links"><a href="dashboard.html">Dashboard</a><a href="products.html">Products</a><a href="cart.html" class="active">Cart</a><a href="contact.html">Contact</a></div>
</nav>
<div class="page-content">
  <div class="page-tag">Shopping</div>
  <h1 class="page-title">Your Cart</h1>
  <div id="cartLayout"></div>
</div>
<div class="toast" id="toast"></div>
<div class="page-credit">Built by <span>Jashwanth</span></div>
<script src="session.js"></script>
<script>
  let cart=JSON.parse(sessionStorage.getItem('cart')||'[]');
  function render(){
    const layout=document.getElementById('cartLayout');
    if(!cart.length){layout.innerHTML='<div class="empty-cart"><div class="big-emoji">🛒</div><p>Your cart is empty.</p><a href="products.html" class="btn-shop">Browse Products</a></div>';return;}
    const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
    const ship=sub>100?0:9.99;const total=sub+ship;
    layout.innerHTML=`<div class="cart-layout"><div class="cart-items">${cart.map(item=>`<div class="cart-item" data-id="${item.id}"><div class="item-emoji">${item.emoji}</div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-category">${item.category}</div></div><div class="item-controls"><button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button><span class="qty-val">${item.qty}</span><button class="qty-btn" onclick="changeQty(${item.id},1)">+</button></div><div class="item-price">$${(item.price*item.qty).toFixed(2)}</div><button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">✕</button></div>`).join('')}</div><div class="summary"><div class="summary-title">Order Summary</div><div class="summary-row"><span>Subtotal</span><span>$${sub.toFixed(2)}</span></div><div class="summary-row"><span>Shipping</span><span>${ship===0?'Free 🎉':'$'+ship.toFixed(2)}</span></div>${ship>0?`<div class="summary-row"><span style="color:#4287f5">Add $${(100-sub).toFixed(2)} for free shipping</span></div>`:''}<div class="summary-row total"><span>Total</span><span style="color:var(--accent)">$${total.toFixed(2)}</span></div><button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button><a href="products.html" class="continue-link">← Continue Shopping</a></div></div>`;
  }
  function changeQty(id,delta){const item=cart.find(i=>i.id===id);if(!item)return;item.qty+=delta;if(item.qty<=0){removeItem(id);return;}sessionStorage.setItem('cart',JSON.stringify(cart));render();}
  function removeItem(id){const item=cart.find(i=>i.id===id);cart=cart.filter(i=>i.id!==id);sessionStorage.setItem('cart',JSON.stringify(cart));showToast('Removed '+item?.name);render();}
  function checkout(){showToast('✓ Order placed! (Test mode)');setTimeout(()=>{cart=[];sessionStorage.setItem('cart',JSON.stringify(cart));render();},1500);}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast success show';setTimeout(()=>t.className='toast',2500);}
  render();
</script>
</body>
</html>
